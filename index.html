<!DOCTYPE html>
<html>
<head>
    <title>Crop Detection (VLM)</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f7fa;
        }
        .wrapper {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .upload-box {
            border: 2px dashed #ccc;
            padding: 25px;
            border-radius: 10px;
            cursor: pointer;
        }
        input[type="file"] { display: none; }
        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 8px;
            font-size: 16px;
        }
        img {
            margin-top: 20px;
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 10px;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .crop { color: green; }
        .no_crop { color: red; }
    </style>
</head>

<body>

<div class="wrapper">
    <div class="card">

        <h2>🌿 Crop Detection (VLM)</h2>

        <form method="POST" enctype="multipart/form-data">
            <label class="upload-box">
                Click to upload image
                <input type="file" name="image" required onchange="previewImage(event)">
            </label>

            <button type="submit">Predict</button>
        </form>

        <img id="preview" style="display:none;" />

        {% if image_path %}
            <img src="{{ image_path }}">
        {% endif %}

        {% if prediction %}
            <div class="result">
                Prediction:
                <span class="{{ 'crop' if prediction=='Crop' else 'no_crop' }}">
                    {{ prediction }}
                </span><br>
                Confidence: {{ confidence }}%
            </div>
        {% endif %}

    </div>
</div>

<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function(){
        const output = document.getElementById('preview');
        output.src = reader.result;
        output.style.display = "block";
    };
    reader.readAsDataURL(event.target.files[0]);
}
</script>

</body>
</html>
